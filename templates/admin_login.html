<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-800">
    <div class="flex min-h-screen items-center justify-center px-4 py-10">
      <div class="w-full max-w-md rounded-2xl border border-slate-200 bg-white p-8 shadow-xl">
        <div class="mb-8 flex items-center justify-center">
          <div class="flex h-12 w-12 items-center justify-center rounded-full bg-red-500 text-xl font-semibold text-white">
            A
          </div>
        </div>

        <div class="text-center">
          <h1 class="text-2xl font-semibold tracking-tight">Sign in</h1>
          <p class="mt-2 text-sm text-slate-500">Use your admin account to continue</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="mt-4 rounded-md border px-3 py-2 text-sm {% if category == 'danger' %}border-red-200 bg-red-50 text-red-700{% elif category == 'success' %}border-green-200 bg-green-50 text-green-700{% else %}border-yellow-200 bg-yellow-50 text-yellow-700{% endif %}">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="post" class="mt-6 space-y-4">
          <div>
            <label class="mb-1 block text-sm font-medium text-slate-700" for="username">Email or username</label>
            <input id="username" type="text" name="username" placeholder="admin" required class="w-full rounded-lg border border-slate-300 px-3 py-3 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100" />
          </div>

          <div>
            <label class="mb-1 block text-sm font-medium text-slate-700" for="password">Password</label>
            <input id="password" type="password" name="password" placeholder="••••••••" required class="w-full rounded-lg border border-slate-300 px-3 py-3 text-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-100" />
          </div>

          <button type="submit" class="w-full rounded-lg bg-blue-600 px-4 py-3 text-sm font-semibold text-white transition hover:bg-blue-700">
            Next
          </button>
        </form>

        <div class="mt-6 text-center">
          <a href="{{ url_for('index') }}" class="text-sm font-medium text-blue-600 hover:text-blue-700">Back to home</a>
        </div>
      </div>
    </div>
  </body>
</html>
